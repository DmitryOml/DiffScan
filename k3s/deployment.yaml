apiVersion: v1
kind: Namespace
metadata:
  name: smartdiffscan
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: smart-diff-scan
  namespace: smartdiffscan
spec:
  replicas: 1
  selector:
    matchLabels:
      app: smart-diff-scan
  template:
    metadata:
      labels:
        app: smart-diff-scan
    spec:
      containers:
        - name: smart-diff-scan
          image: docker.local/smart-diff-scan
          ports:
            - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: smart-diff-scan
  namespace: smartdiffscan
spec:
  selector:
    app: smart-diff-scan
  ports:
    - port: 80
      targetPort: 80
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: smart-diff-scan
  namespace: smartdiffscan
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
spec:
  ingressClassName: nginx
  rules:
    - host: diff.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: smart-diff-scan
                port:
                  number: 80
